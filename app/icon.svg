<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#18181b"/>

  <!-- Book pages (main body) -->
  <rect x="8" y="4" width="16" height="24" rx="2" fill="#f4f4f5"/>

  <!-- Spine -->
  <rect x="8" y="4" width="4.5" height="24" rx="1.5" fill="#3f3f46"/>

  <!-- Ring binder hole -->
  <circle cx="10.25" cy="11" r="1.2" fill="#18181b"/>
  <circle cx="10.25" cy="16" r="1.2" fill="#18181b"/>
  <circle cx="10.25" cy="21" r="1.2" fill="#18181b"/>

  <!-- Alphabet tabs on right edge -->
  <rect x="22.5" y="6"  width="2.5" height="5" rx="0.75" fill="#10b981"/>
  <rect x="22.5" y="13" width="2.5" height="5" rx="0.75" fill="#8b5cf6"/>
  <rect x="22.5" y="20" width="2.5" height="5" rx="0.75" fill="#f59e0b"/>

  <!-- Contact entry lines -->
  <rect x="14" y="9"  width="7" height="1.5" rx="0.75" fill="#a1a1aa"/>
  <rect x="14" y="12" width="5" height="1.5" rx="0.75" fill="#d4d4d8"/>
  <rect x="14" y="16" width="6" height="1.5" rx="0.75" fill="#a1a1aa"/>
  <rect x="14" y="19" width="4" height="1.5" rx="0.75" fill="#d4d4d8"/>
  <rect x="14" y="22" width="7" height="1.5" rx="0.75" fill="#a1a1aa"/>
</svg>
